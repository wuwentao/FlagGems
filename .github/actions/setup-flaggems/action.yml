name: "Setup FlagGems"
description: "Run setup.sh for a vendor and optionally check GPU availability"

inputs:
  vendor:
    description: "FlagGems vendor name (e.g. nvidia, mthreads, ascend-cann900)"
    required: true
  gpu_check_script:
    description: "Path to GPU check script (leave empty to skip)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup FlagGems
      shell: bash
      run: ./setup.sh ${{ inputs.vendor }}

    - name: Install vllm (nvidia only)
      if: inputs.vendor == 'nvidia'
      shell: bash
      run: |
        source .venv/bin/activate
        uv pip install vllm==0.21.0 --torch-backend=cu130

    - name: Check GPU availability
      if: inputs.gpu_check_script != ''
      shell: bash
      run: |
        source tools/env.sh ${{ inputs.vendor }}
        bash ${{ inputs.gpu_check_script }}
